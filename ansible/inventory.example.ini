# Copy to inventory.ini and edit. inventory.ini is gitignored.
# A realistic estate: web fleet + database nodes, split across staging and prod.
# Run the playbook against everything, or scope it with --limit (see README).

[web]
web1 ansible_host=203.0.113.10
web2 ansible_host=203.0.113.11
web3 ansible_host=203.0.113.12

[db]
db1 ansible_host=203.0.113.20
db2 ansible_host=203.0.113.21

[staging]
stg-web1 ansible_host=198.51.100.10
stg-db1  ansible_host=198.51.100.20

# logical grouping, prod is every web and db host
[prod:children]
web
db

[all:vars]
ansible_user=root          # first run connects as root; the playbook creates the admin user
ansible_python_interpreter=/usr/bin/python3
